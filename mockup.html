<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#8fd3ff" />
  <title>BIG FIGHT — Character Lab</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100dvh; overflow: hidden; background: #8fd3ff;
      font-family: 'Avenir Next', system-ui, sans-serif; touch-action: manipulation; }
    #lab { position: fixed; inset: 0; }
    .panel { position: fixed; left: 0; right: 0; display: flex; gap: 8px; justify-content: center;
      flex-wrap: wrap; padding: 10px; z-index: 5; }
    .panel.top { top: env(safe-area-inset-top, 0px); }
    .panel.bottom { bottom: env(safe-area-inset-bottom, 0px); }
    button { appearance: none; border: none; border-radius: 16px; padding: 12px 18px;
      font: 800 15px 'Avenir Next', system-ui, sans-serif; letter-spacing: 1px; color: #fff;
      background: #1a9fe8; box-shadow: 0 4px 0 rgba(30,42,74,.3); cursor: pointer; }
    button:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(30,42,74,.3); }
    button.on { background: #ffc93e; color: #6a4a00; }
    button.atk { background: #ff5a8a; }
    button.signature { background: #7657d6; }
    button.chr { background: #4ec95c; }
    #label { position: fixed; top: 74px; width: 100%; text-align: center; z-index: 4;
      font-weight: 800; font-size: 15px; color: #fff; text-shadow: 0 2px 0 rgba(30,42,74,.35);
      padding: 0 16px; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="lab"></canvas>
  <div class="panel top">
    <button id="optA" class="on">A · HEROES</button>
    <button id="optB">B · CHIBI</button>
    <button id="optC">C · ACTION</button>
    <button id="chr" class="chr">VOLT ⇄ GRIM</button>
  </div>
  <div id="label"></div>
  <div class="panel bottom">
    <button id="jab" class="atk">PUNCH COMBO</button>
    <button id="weapon" class="atk">WEAPON</button>
    <button id="signature" class="signature">SIGNATURE</button>
    <button id="run">RUN</button>
    <button id="spinBtn">SPIN VIEW</button>
  </div>
  <script type="module" src="/src/mockup.ts"></script>
</body>
</html>
