app = "bigfight-online"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "20s"
    method = "GET"
    timeout = "3s"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
